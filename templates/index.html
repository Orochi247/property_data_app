<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Houzeo Autofill Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container py-3" style="max-width: 900px;">
        
        <div class="top-nav">
            <span class="text-muted fw-bold me-3">Agent: <span class="text-dark">{{ current_user }}</span></span>
            <a href="/logout" class="btn btn-sm btn-outline-danger rounded-pill fw-bold px-3">Logout</a>
        </div>

        <div class="text-center mb-4">
            <h1 style="color: var(--houzeo-blue); font-weight: 800; font-size: 2.8rem; letter-spacing: -1px; margin-bottom: 0;">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="currentColor" style="margin-top: -8px;">
                    <path d="M12 3L2 12h3v8h6v-6h2v6h6v-8h3L12 3zm0 2.7l5 4.5V18h-2v-6H9v6H7v-7.8l5-4.5z"/>
                </svg>
                Houzeo<span style="color: #333; font-size: 1.5rem; vertical-align: middle;"> Autofill Tracker</span>
            </h1>
        </div>

        <div id="msg" class="mb-4 text-center"></div>

        <div class="modern-card">
            <form id="dataForm">
                
                <div class="step-header">
                    <div class="step-badge">1</div>
                    <h3 class="step-title">Record Identification</h3>
                </div>
                <div class="row mb-4">
                    <div class="col-md-12">
                        <label for="hid" class="form-label">Property HID</label>
                        <input type="text" class="form-control" id="hid" placeholder="Enter Property HID..." required>
                    </div>
                </div>

                <div class="step-header mt-5">
                    <div class="step-badge">2</div>
                    <h3 class="step-title">Property Specifications</h3>
                </div>
                <div class="mb-4">
                    <label for="mls_name" class="form-label">MLS Name</label>
                    <select class="form-select searchable-select" id="mls_name" required>
                        <option value="" disabled selected>Search MLS Database...</option>
                        {% for mls in mls_list %}
                            <option value="{{ mls }}">{{ mls }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="row mb-4">
                    <div class="col-md-4 mb-3 mb-md-0">
                        <label for="prop_type" class="form-label">Property Type</label>
                        <select class="form-select" id="prop_type" required>
                            <option value="" disabled selected>Select...</option>
                            <option value="Residential">Residential</option>
                            <option value="Commercial">Commercial</option>
                            <option value="Land">Land</option>
                        </select>
                    </div>
                    <div class="col-md-4 mb-3 mb-md-0">
                        <label for="home_type" class="form-label">Home Type</label>
                        <select class="form-select" id="home_type" required>
                            <option value="" disabled selected>Select...</option>
                            <option value="Single Family Residence">Single Family Residence</option>
                            <option value="Condo">Condo</option>
                            <option value="Mobile">Mobile</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label for="listing_date" class="form-label">Listing Date</label>
                        <input type="date" class="form-control" id="listing_date" required>
                    </div>
                </div>

                <div class="step-header mt-5">
                    <div class="step-badge">3</div>
                    <h3 class="step-title">Status & Tracking</h3>
                </div>
                <div class="row mb-4">
                    <div class="col-md-4 mb-3 mb-md-0">
                        <label for="status" class="form-label">Record Status</label>
                        <select class="form-select" id="status" required>
                            <option value="" disabled selected>Select status...</option>
                            <option value="Found">Data Found</option>
                            <option value="Not Found">Not Found</option>
                        </select>
                    </div>
                    <div class="col-md-4 mb-3 mb-md-0">
                        <label for="start_time" class="form-label">Start Time</label>
                        <input type="text" class="form-control time-picker" id="start_time" placeholder="HH:MM:SS" required>
                    </div>
                    <div class="col-md-4">
                        <label for="end_time" class="form-label">End Time</label>
                        <input type="text" class="form-control time-picker" id="end_time" placeholder="HH:MM:SS" required>
                    </div>
                </div>

                <div class="mt-5">
                    <button type="submit" class="btn btn-brand w-100" id="submitBtn">
                        <span id="btnText">Save Entry</span>
                    </button>
                </div>
            </form>
        </div>

        <div class="modern-card p-0 overflow-hidden">
            <div class="d-flex justify-content-between align-items-center p-4 border-bottom">
                <h5 class="fw-bold mb-0" style="color: var(--houzeo-blue);">Recent Submissions</h5>
                <button type="button" class="btn btn-sm btn-outline-secondary fw-bold rounded-pill px-3" onclick="refreshTable()">
                    🔄 Refresh Data
                </button>
            </div>
            <div class="table-responsive">
                <table class="table table-custom table-hover mb-0" id="entriesTable">
                    <thead>
                        <tr>
                            <th>HID</th>
                            <th>Agent</th>
                            <th>MLS / Property Details</th>
                            <th>Status</th>
                            <th>Time Log</th>
                            <th class="text-end">Action</th>
                        </tr>
                    </thead>
                    <tbody id="entriesBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

    <script>
        let isEditMode = false;

        async function refreshTable() {
            try {
                const res = await fetch('/get_recent');
                const data = await res.json();
                let html = '';
                
                data.forEach(row => {
                    const rowDataStr = encodeURIComponent(JSON.stringify(row));
                    const isFound = (row[6] === 'Found' || row[6] === 'Data Found');
                    const statusClass = isFound ? 'bg-found' : 'bg-not-found';
                    const statusText = isFound ? 'Found' : 'Not Found';
                    
                    html += `<tr>
                        <td><span class="fw-bold">${row[0]}</span></td>
                        <td>${row[1]}</td>
                        <td>
                            <div class="fw-bold text-dark">${row[2]}</div>
                            <div class="mt-1">
                                <span class="type-pill">${row[3] || '-'}</span> 
                                <span class="type-pill">${row[4] || '-'}</span>
                            </div>
                        </td>
                        <td><span class="status-badge ${statusClass}">● ${statusText}</span></td>
                        <td>
                            <div class="fw-bold text-dark">${row[7] || '-'}</div>
                            <small class="text-muted">${row[5] || '-'}</small>
                        </td>
                        <td class="text-end">
                            <button type="button" class="btn btn-sm btn-outline-primary rounded-pill px-3 fw-bold edit-btn" data-row="${rowDataStr}">Edit</button>
                        </td>
                    </tr>`;
                });
                $('#entriesBody').html(html || '<tr><td colspan="6" class="text-center py-4 text-muted">No data found</td></tr>');
            } catch (err) {
                console.error("Table Load Error:", err);
            }
        }

        $(document).ready(function() {
            // Apply Select2 and Flatpickr
            $('.searchable-select').select2({ width: '100%' });
            flatpickr(".time-picker", { enableTime: true, noCalendar: true, dateFormat: "H:i:S", time_24hr: true, enableSeconds: true });
            
            refreshTable();

            // Edit Logic
            $('#entriesBody').on('click', '.edit-btn', function() {
                const rowDataStr = $(this).attr('data-row');
                const row = JSON.parse(decodeURIComponent(rowDataStr));
                
                $('#hid').val(row[0]).prop('readonly', true); 
                // We no longer populate the username dropdown because it doesn't exist!
                $('#mls_name').val(row[2]).trigger('change'); 
                $('#prop_type').val(row[3]); 
                $('#home_type').val(row[4]);
                $('#listing_date').val(row[5]);
                
                if (row[6] === 'Found' || row[6] === 'Data Found') {
                    $('#status').val('Found');
                } else {
                    $('#status').val('Not Found');
                }
                
                $('#start_time').val('').removeAttr('required');
                $('#end_time').val('').removeAttr('required');
                
                isEditMode = true;
                $('#submitBtn').css({'background-color': '#f59e0b', 'border-color': '#f59e0b'}); // Warning yellow
                $('#btnText').text('Update Entry');
                $('#msg').html(`<div class="alert alert-warning fw-bold border-0 shadow-sm" style="background-color: #fef3c7; color: #92400e;">✎ Editing Record HID: ${row[0]}</div>`);
                
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });

            // Submit Logic
            $('#dataForm').on('submit', async function(e) {
                e.preventDefault();

                if (!this.checkValidity()) {
                    this.reportValidity();
                    return; 
                }

                const btn = $('#submitBtn');
                const btnText = $('#btnText');
                btn.prop('disabled', true);
                btnText.text(isEditMode ? 'Updating Server...' : 'Saving Record...'); 

                // Notice: 'user_name' is no longer included in the payload. The server handles it safely now!
                const payload = {
                    hid: $('#hid').val(), 
                    mls_name: $('#mls_name').val(),
                    prop_type: $('#prop_type').val(),
                    home_type: $('#home_type').val(),
                    listing_date: $('#listing_date').val(),
                    status: $('#status').val(),
                    start_time: $('#start_time').val(), 
                    end_time: $('#end_time').val()
                };

                const endpoint = isEditMode ? '/update' : '/submit';

                try {
                    const res = await fetch(endpoint, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(payload)
                    });
                    
                    if (!res.ok) {
                        const errData = await res.json();
                        throw new Error(errData.message || `Server returned ${res.status}`);
                    }
                    
                    const result = await res.json();

                    if (result.status === "success") {
                        $('#msg').html(`<div class="alert alert-success fw-bold border-0 shadow-sm" style="background-color: #dcfce7; color: #166534;">✅ ${result.message}</div>`);
                        
                        $('#dataForm')[0].reset();
                        $('#mls_name').val(null).trigger('change');
                        
                        if (isEditMode) {
                            isEditMode = false;
                            $('#hid').prop('readonly', false); 
                            $('#start_time').attr('required', true); 
                            $('#end_time').attr('required', true);
                            $('#submitBtn').css({'background-color': '', 'border-color': ''}); 
                        }
                        
                        refreshTable(); 
                    }
                } catch (err) {
                    $('#msg').html(`<div class="alert alert-danger fw-bold border-0 shadow-sm" style="background-color: #fee2e2; color: #991b1b;">❌ Error: ${err.message}</div>`);
                } finally {
                    btn.prop('disabled', false);
                    btnText.text(isEditMode ? 'Update Entry' : 'Save Entry'); 
                    if(!isEditMode && !btn.prop('disabled')){
                        setTimeout(() => { $('#msg').empty(); }, 5000);
                    }
                }
            });
        });
    </script>
    <section>
  <div class='air air1'></div>
  <div class='air air2'></div>
  <div class='air air3'></div>
  <div class='air air4'></div>
</section>
</body>
</html>
