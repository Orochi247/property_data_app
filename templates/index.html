<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autofill Data Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
</head>
<body class="bg-light p-4">
    <div class="container max-w-4xl mx-auto">
        <h2 class="mb-4 text-center fw-bold">Autofill Data Tracker</h2>

        <div id="msg" class="mb-3 text-center"></div>

        <div class="card shadow-sm mb-5">
            <div class="card-body">
                <form id="dataForm">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="user_name" class="form-label fw-bold">Data Entry User</label>
                            <select class="form-select" id="user_name" required>
                                <option value="" disabled selected>Select your name...</option>
                                <option value="Abhishek">Abhishek</option>
                                <option value="Shreyan">Shreyan</option>
                                <option value="Sneha">Sneha</option>
                                <option value="Nikita">Nikita</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="hid" class="form-label fw-bold">HID</label>
                            <input type="text" class="form-control" id="hid" placeholder="Enter HID..." required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="mls_name" class="form-label fw-bold">MLS Name</label>
                        <select class="form-select searchable-select" id="mls_name" required>
                            <option value="" disabled selected>Search MLS...</option>
                            {% for mls in mls_list %}
                                <option value="{{ mls }}">{{ mls }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="prop_type" class="form-label fw-bold">Property Type</label>
                            <select class="form-select" id="prop_type" required>
                                <option value="" disabled selected>Select...</option>
                                <option value="Residential">Residential</option>
                                <option value="Commercial">Commercial</option>
                                <option value="Land">Land</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="home_type" class="form-label fw-bold">Home Type</label>
                            <select class="form-select" id="home_type" required>
                                <option value="" disabled selected>Select...</option>
                                <option value="Single Family Residence">Single Family Residence</option>
                                <option value="Condo">Condo</option>
                                <option value="Mobile">Mobile</option>
                                <option value="Manufactured">Manufactured</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="listing_date" class="form-label fw-bold">Listing Date</label>
                            <input type="date" class="form-control" id="listing_date" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="status" class="form-label fw-bold">Status</label>
                            <select class="form-select" id="status" required>
                                <option value="" disabled selected>Select...</option>
                                <option value="Found">Data Found</option>
                                <option value="Not Found">Not Found</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="start_time" class="form-label fw-bold">Start Time</label>
                            <input type="text" class="form-control time-picker" id="start_time" placeholder="HH:MM:SS" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="end_time" class="form-label fw-bold">End Time</label>
                            <input type="text" class="form-control time-picker" id="end_time" placeholder="HH:MM:SS" required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 fw-bold py-2 mt-3" id="submitBtn">
                        <span id="btnText">Submit Entry</span>
                    </button>
                </form>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-header bg-dark text-white fw-bold d-flex justify-content-between align-items-center">
                <span>Recent Submissions</span>
                <button type="button" class="btn btn-sm btn-light fw-bold" onclick="refreshTable()">
                    🔄 Refresh
                </button>
            </div>
            <div class="card-body p-0 table-responsive">
                <table class="table table-striped table-hover mb-0" id="entriesTable">
                    <thead class="table-dark">
                        <tr>
                            <th>HID</th>
                            <th>User</th>
                            <th>MLS Name</th>
                            <th>Prop Type</th>
                            <th>Home Type</th>
                            <th>Listing Date</th>
                            <th>Status</th>
                            <th>Time</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="entriesBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

    <script>
        let isEditMode = false;

        async function refreshTable() {
            try {
                const res = await fetch('/get_recent');
                const data = await res.json();
                let html = '';
                
                data.forEach(row => {
                    // Safe Data Binding for Edit Button
                    const rowDataStr = encodeURIComponent(JSON.stringify(row));
                    const isFound = (row[6] === 'Found' || row[6] === 'Data Found');
                    
                    html += `<tr>
                        <td><strong>${row[0]}</strong></td>
                        <td>${row[1]}</td>
                        <td><span class="badge bg-info text-dark">${row[2]}</span></td>
                        <td><span class="badge bg-secondary">${row[3] || '-'}</span></td>
                        <td><span class="badge bg-secondary">${row[4] || '-'}</span></td>
                        <td>${row[5] || '-'}</td>
                        <td>${isFound ? '✅' : '❌'}</td>
                        <td>${row[7] || '-'}</td>
                        <td>
                            <button type="button" class="btn btn-sm btn-outline-warning fw-bold edit-btn" data-row="${rowDataStr}">Edit</button>
                        </td>
                    </tr>`;
                });
                $('#entriesBody').html(html || '<tr><td colspan="9" class="text-center">No data found</td></tr>');
            } catch (err) {
                console.error("Table Load Error:", err);
            }
        }

        $(document).ready(function() {
            $('.searchable-select').select2();
            flatpickr(".time-picker", { enableTime: true, noCalendar: true, dateFormat: "H:i:S", time_24hr: true, enableSeconds: true });
            
            const savedUser = localStorage.getItem('dataEntryUser');
            if (savedUser) $('#user_name').val(savedUser);
            $('#user_name').on('change', function() { localStorage.setItem('dataEntryUser', $(this).val()); });

            refreshTable();

            // NEW BULLETPROOF EDIT BUTTON LOGIC
            $('#entriesBody').on('click', '.edit-btn', function() {
                const rowDataStr = $(this).attr('data-row');
                const row = JSON.parse(decodeURIComponent(rowDataStr));
                
                $('#hid').val(row[0]).prop('readonly', true); 
                $('#user_name').val(row[1]);
                $('#mls_name').val(row[2]).trigger('change'); 
                $('#prop_type').val(row[3]); 
                $('#home_type').val(row[4]);
                $('#listing_date').val(row[5]);
                
                // Handle different status names gracefully
                if (row[6] === 'Found' || row[6] === 'Data Found') {
                    $('#status').val('Found');
                } else {
                    $('#status').val('Not Found');
                }
                
                $('#start_time').val('').removeAttr('required');
                $('#end_time').val('').removeAttr('required');
                
                isEditMode = true;
                $('#submitBtn').removeClass('btn-primary').addClass('btn-warning');
                $('#btnText').text('Update Entry');
                $('#msg').html(`<div class="alert alert-warning fw-bold">Editing HID: ${row[0]}</div>`);
                
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });

            $('#dataForm').on('submit', async function(e) {
                e.preventDefault();

                if (!this.checkValidity()) {
                    this.reportValidity();
                    return; 
                }

                const btn = $('#submitBtn');
                const btnText = $('#btnText');
                btn.prop('disabled', true);
                btnText.text(isEditMode ? 'Updating...' : 'Saving...'); 

                const payload = {
                    user_name: $('#user_name').val(),
                    hid: $('#hid').val(), 
                    mls_name: $('#mls_name').val(),
                    prop_type: $('#prop_type').val(),
                    home_type: $('#home_type').val(),
                    listing_date: $('#listing_date').val(),
                    status: $('#status').val(),
                    start_time: $('#start_time').val(), 
                    end_time: $('#end_time').val()
                };

                const endpoint = isEditMode ? '/update' : '/submit';

                try {
                    const res = await fetch(endpoint, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(payload)
                    });
                    
                    // ADVANCED ERROR TRACING
                    if (!res.ok) {
                        const errData = await res.json();
                        throw new Error(errData.message || `Server returned ${res.status}`);
                    }
                    
                    const result = await res.json();

                    if (result.status === "success") {
                        $('#msg').html(`<div class="text-success fw-bold mb-3">✅ ${result.message}</div>`);
                        
                        const currentUser = $('#user_name').val();
                        $('#dataForm')[0].reset();
                        $('#user_name').val(currentUser);
                        $('#mls_name').val(null).trigger('change');
                        
                        if (isEditMode) {
                            isEditMode = false;
                            $('#hid').prop('readonly', false); 
                            $('#start_time').attr('required', true); 
                            $('#end_time').attr('required', true);
                            btn.removeClass('btn-warning').addClass('btn-primary');
                        }
                        
                        refreshTable(); 
                    }
                } catch (err) {
                    // This will now print the EXACT error instead of a generic message
                    $('#msg').html(`<div class="text-danger fw-bold mb-3">❌ Error: ${err.message}</div>`);
                } finally {
                    btn.prop('disabled', false);
                    btnText.text(isEditMode ? 'Update Entry' : 'Submit Entry'); 
                }
            });
        });
    </script>
</body>
</html>
