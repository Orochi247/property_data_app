<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Houzeo Data Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f4f7fb; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { background: #ffffff; border-radius: 16px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04); padding: 3rem 2rem; width: 100%; max-width: 400px; }
        .form-control { border-radius: 8px; padding: 0.75rem 1rem; }
        .btn-brand { background-color: #0066cc; color: white; border-radius: 8px; padding: 0.8rem; font-weight: 600; width: 100%; }
        .btn-brand:hover { background-color: #0052a3; color: white; }
    </style>
</head>
<body class ="login-wrapper">
    <div class="login-card">
        <div class="text-center mb-4">
            <h2 style="color: #0066cc; font-weight: 800; letter-spacing: -1px;">
                <svg width="30" height="30" viewBox="0 0 24 24" fill="currentColor" style="margin-top: -6px;">
                    <path d="M12 3L2 12h3v8h6v-6h2v6h6v-8h3L12 3zm0 2.7l5 4.5V18h-2v-6H9v6H7v-7.8l5-4.5z"/>
                </svg>
                Houzeo
            </h2>
            <p class="text-muted fw-bold">User Login</p>
        </div>
        
        {% if error %}
            <div class="alert alert-danger text-center fw-bold border-0" style="background-color: #fee2e2; color: #991b1b; padding: 10px;">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="mb-3">
                <label class="form-label fw-bold text-muted" style="font-size: 0.85rem;">User ID (Name)</label>
                <input type="text" name="username" class="form-control" required autofocus>
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold text-muted" style="font-size: 0.85rem;">Password</label>
                
                <div class="position-relative">
                    <input type="password" name="password" id="passwordInput" class="form-control" style="padding-right: 2.5rem;" required>
                    
                    <button type="button" id="togglePassword" class="btn btn-link position-absolute end-0 top-50 translate-middle-y text-muted" style="padding: 0.5rem 0.8rem; border: none; background: transparent; outline: none;">
                        <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                            <path d="M10.5 8a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0z"/>
                            <path d="M0 8s3-5.5 8-5.5S16 8 16 8s-3 5.5-8 5.5S0 8 0 8zm8 3.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7z"/>
                        </svg>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn btn-brand">Sign In</button>
        </form>
        <script>
        const togglePassword = document.querySelector('#togglePassword');
        const passwordInput = document.querySelector('#passwordInput');
        const eyeIcon = document.querySelector('#eyeIcon');

        togglePassword.addEventListener('click', function () {
            // Toggle the type attribute between 'password' and 'text'
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            // Dim the icon slightly when the password is visible
            eyeIcon.style.opacity = type === 'password' ? '1' : '0.5';
        });
    </script>
    </div>
</body>
</html>
